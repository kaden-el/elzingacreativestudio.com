name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate config.js from secrets
        run: |
          echo "window.ELZINGA_CONFIG = {" > config.js
          echo "  supabaseUrl: '${{ secrets.SUPABASE_URL }}'," >> config.js
          echo "  supabaseKey: '${{ secrets.SUPABASE_KEY }}'," >> config.js
          echo "  emailjsPublicKey: '${{ secrets.EMAILJS_PUBLIC_KEY }}'," >> config.js
          echo "  emailjsServiceId: '${{ secrets.EMAILJS_SERVICE_ID }}'," >> config.js
          echo "  emailjsTemplateId: '${{ secrets.EMAILJS_TEMPLATE_ID }}'," >> config.js
          echo "};" >> config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
